name: Generate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify Generated Code
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@v1.3.1

      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run generators
        run: go run ./hack/generate.go

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code -- '*.go'; then
            echo "::error::Generated code is out of date. Run 'go run ./hack/generate.go' and commit the changes."
            exit 1
          fi
